name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Calidad (lint, tipado, tests, seguridad)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Ruff (PEP 8 + PEP 257)
        run: ruff check .

      - name: Black (formato consistente)
        run: black --check .

      - name: MyPy (tipado estatico)
        run: mypy src

      - name: Pyright (tipado estatico)
        run: pyright

      - name: Pytest (tests + cobertura >= 85%)
        run: pytest

      - name: Bandit (seguridad)
        run: bandit -r src -c pyproject.toml

  docs:
    name: Documentacion (pdoc)
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pdoc

      - name: Generar documentacion con pdoc
        run: pdoc src/json2csv -o docs

      - name: Publicar documentacion como artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentacion-pdoc
          path: docs
